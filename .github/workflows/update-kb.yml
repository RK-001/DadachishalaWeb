name: KB Updater
# Generic Knowledge Base maintenance workflow.
# Configuration lives in .github/kb-config.yml — no edits needed here when
# source files are added or renamed; update the mappings in kb-config.yml instead.

on:
  pull_request:
    types: [closed]
    branches:
      - main
  workflow_dispatch:
    inputs:
      pull_number:
        description: "PR number to process (required for manual runs)"
        required: false
        type: string

concurrency:
  group: kb-updater-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: false

jobs:
  update-knowledge-base:
    if: github.event.pull_request.merged == true || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: read
      models: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.KB_BOT_PAT || github.token }}

      # ── Step 1: Parse kb-config.yml + match PR changed files against mappings ──
      # Python3 (available on ubuntu-latest) handles YAML parsing and glob matching.
      # Outputs /tmp/kb_resolve.json consumed by the next step.
      - name: Resolve affected KB docs from config
        id: resolve_docs
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number || inputs.pull_number }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python3 << 'PYEOF' > /tmp/kb_resolve.json
          import yaml, json, fnmatch, os, urllib.request, sys

          def get_pr_files(token, repo, pr_number):
            files = []
            page = 1
            while True:
              url = f"https://api.github.com/repos/{repo}/pulls/{pr_number}/files?per_page=100&page={page}"
              req = urllib.request.Request(url, headers={
                "Authorization": f"Bearer {token}",
                "Accept": "application/vnd.github+json",
                "X-GitHub-Api-Version": "2022-11-28",
              })
              with urllib.request.urlopen(req) as resp:
                batch = json.loads(resp.read())
              if not batch:
                break
              files.extend(f["filename"] for f in batch)
              if len(batch) < 100:
                break
              page += 1
            return files

          try:
            with open(".github/kb-config.yml") as f:
              config = yaml.safe_load(f) or {}
          except Exception as e:
            print(json.dumps({"error": str(e), "config": {}, "kb_doc_to_sources": {}, "unmatched_files": [], "changed_files": []}))
            sys.exit(0)

          pr_number = os.environ.get("PR_NUMBER", "").strip()
          token = os.environ.get("GH_TOKEN", "")
          repo = os.environ.get("GITHUB_REPOSITORY", "")

          changed_files = []
          if pr_number and token and repo:
            try:
              changed_files = get_pr_files(token, repo, pr_number)
            except Exception as e:
              sys.stderr.write(f"Warning: Could not fetch PR files: {e}\n")

          ignore_patterns = config.get("ignore_patterns", [])

          def is_ignored(filepath):
            return any(fnmatch.fnmatch(filepath, pat) for pat in ignore_patterns)

          source_files = [f for f in changed_files if not is_ignored(f)]
          mappings = config.get("mappings", [])
          kb_doc_to_sources = {}
          unmatched_files = []

          for source_file in source_files:
            matched = False
            for mapping in mappings:
              if fnmatch.fnmatch(source_file, mapping.get("pattern", "")):
                for doc in mapping.get("docs", []):
                  kb_doc_to_sources.setdefault(doc, [])
                  if source_file not in kb_doc_to_sources[doc]:
                    kb_doc_to_sources[doc].append(source_file)
                matched = True
            if not matched:
              unmatched_files.append(source_file)

          result = {
            "config": {
              "kb_directory": config.get("kb_directory", "doc"),
              "index_file": config.get("index_file", "INDEX.md"),
              "model_id": config.get("model_id", "openai/gpt-4.1"),
              "max_diff_chars": config.get("max_diff_chars", 40000),
              "max_doc_chars": config.get("max_doc_chars", 80000),
            },
            "kb_doc_to_sources": kb_doc_to_sources,
            "unmatched_files": unmatched_files,
            "changed_files": changed_files,
          }
          print(json.dumps(result))
          PYEOF

          echo "=== Resolve result ==="
          cat /tmp/kb_resolve.json

      # ── Step 2: LLM-powered KB updates ───────────────────────────────────────
      - name: Run KB agent
        id: kb_agent
        uses: actions/github-script@v7
        continue-on-error: true
        env:
          GITHUB_MODELS_TOKEN: ${{ github.token }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            // ── Load config resolved by the Python step ──────────────────────
            const resolveResult = JSON.parse(
              fs.readFileSync('/tmp/kb_resolve.json', 'utf8')
            );
            const config = resolveResult.config || {};
            const kbDirectory = config.kb_directory || 'doc';
            const indexFile = config.index_file || 'INDEX.md';
            const modelId = config.model_id || 'openai/gpt-4.1';
            const maxDiffChars = config.max_diff_chars || 40000;
            const maxDocChars = config.max_doc_chars || 80000;

            let kbDocToSources = resolveResult.kb_doc_to_sources || {};
            const unmatchedFiles = resolveResult.unmatched_files || [];
            const changedFiles = resolveResult.changed_files || [];

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prPayload = context.payload.pull_request || {};
            const pullNumber = prPayload.number || parseInt(process.env.MANUAL_PR_NUMBER || '0', 10);
            const prTitle = prPayload.title || 'Manual run';
            const prBody = prPayload.body || '';
            const prAuthor = prPayload.user?.login || 'unknown';
            const prLabels = (prPayload.labels || []).map((l) => l.name).join(', ');
            const workspace = process.env.GITHUB_WORKSPACE;
            const modelsToken = process.env.GITHUB_MODELS_TOKEN;
            const today = new Date().toISOString().slice(0, 10);

            core.info(`Changed files: ${JSON.stringify(changedFiles)}`);
            core.info(`Explicitly mapped KB docs: ${JSON.stringify(Object.keys(kbDocToSources))}`);
            core.info(`Unmatched source files (LLM will resolve): ${JSON.stringify(unmatchedFiles)}`);

            // ── Helpers ──────────────────────────────────────────────────────
            const readWorkspaceFile = (relativePath) =>
              fs.readFileSync(path.join(workspace, relativePath), 'utf8');

            const writeWorkspaceFile = (relativePath, content) =>
              fs.writeFileSync(path.join(workspace, relativePath), content, 'utf8');

            const callModel = async (messages) => {
              const response = await fetch('https://models.github.ai/inference/chat/completions', {
                method: 'POST',
                headers: {
                  Accept: 'application/vnd.github+json',
                  Authorization: `Bearer ${modelsToken}`,
                  'Content-Type': 'application/json',
                  'X-GitHub-Api-Version': '2022-11-28',
                },
                body: JSON.stringify({ model: modelId, temperature: 0.1, max_tokens: 4000, messages }),
              });
              if (!response.ok) {
                const body = await response.text();
                throw new Error(`GitHub Models request failed (${response.status}): ${body}`);
              }
              const payload = await response.json();
              return payload.choices?.[0]?.message?.content || '';
            };

            const extractDiffForFiles = (diffText, files) => {
              const blocks = diffText.split(/(?=^diff --git )/m);
              return blocks
                .filter((block) => files.some((f) => block.includes(` b/${f}`)))
                .join('\n')
                .slice(0, maxDiffChars);
            };

            const systemPrompt = [
              'You are a Knowledge Base maintainer for an engineering repository.',
              'Update only the KB sections directly justified by the provided merged PR diff.',
              'Preserve existing headings, tables, Mermaid blocks, and requirement IDs unless the diff clearly changes them.',
              `Update date fields to ${today} only when the document content changes.`,
              'Return only the complete updated markdown document. No code fences. No explanation.',
            ].join(' ');

            // ── Fetch PR diff ─────────────────────────────────────────────────
            if (!pullNumber) {
              core.setOutput('changed', 'false');
              core.setOutput('updated_docs', '');
              core.setOutput('diff_bytes', '0');
              core.warning('No PR number available. Skipping.');
              return;
            }

            const diffResponse = await github.request('GET /repos/{owner}/{repo}/pulls/{pull_number}', {
              owner, repo, pull_number: pullNumber,
              headers: { accept: 'application/vnd.github.v3.diff' },
            });
            const fullDiff = String(diffResponse.data || '');
            core.setOutput('diff_bytes', String(Buffer.byteLength(fullDiff, 'utf8')));

            // ── LLM-resolve unmatched files via INDEX.md ──────────────────────
            if (unmatchedFiles.length > 0) {
              const indexContent = readWorkspaceFile(indexFile);
              const resolvePrompt = [
                'Below is the repository INDEX.md that lists all Knowledge Base documents and what they cover.',
                'Based on the list of changed source files, identify which KB doc files (if any) should be updated.',
                'Return ONLY a JSON object with one key "mappings": an array of objects {source_file, kb_doc}.',
                'If a source file has no relevant KB doc, omit it. Do not invent doc paths not in the INDEX.',
                '',
                `Changed source files: ${JSON.stringify(unmatchedFiles)}`,
                '',
                'INDEX.md:',
                indexContent.slice(0, 30000),
              ].join('\n');

              try {
                const resolveRaw = await callModel([
                  { role: 'system', content: 'You are a documentation routing assistant. Return raw JSON only, no markdown fences.' },
                  { role: 'user', content: resolvePrompt },
                ]);
                const cleaned = resolveRaw.replace(/```json\n?|```\n?/g, '').trim();
                const resolved = JSON.parse(cleaned);
                for (const { source_file, kb_doc } of resolved.mappings || []) {
                  kbDocToSources[kb_doc] ||= [];
                  if (!kbDocToSources[kb_doc].includes(source_file)) {
                    kbDocToSources[kb_doc].push(source_file);
                  }
                }
                core.info(`LLM-resolved additional KB docs: ${JSON.stringify(resolved.mappings)}`);
              } catch (e) {
                core.warning(`LLM routing for unmatched files failed: ${e.message}`);
              }
            }

            const affectedDocs = Object.keys(kbDocToSources);
            core.info(`Final affected KB docs: ${JSON.stringify(affectedDocs)}`);

            if (affectedDocs.length === 0) {
              core.setOutput('changed', 'false');
              core.setOutput('updated_docs', '');
              return;
            }

            // ── Update each affected KB doc ───────────────────────────────────
            const updatedDocs = [];
            const kbSummaries = {};

            for (const kbDoc of affectedDocs) {
              let currentContent;
              try { currentContent = readWorkspaceFile(kbDoc); } catch { continue; }
              const relevantDiff = extractDiffForFiles(fullDiff, kbDocToSources[kbDoc]);
              if (!relevantDiff.trim()) continue;

              const userPrompt = [
                `PR #${pullNumber}: ${prTitle}`,
                `Author: @${prAuthor}`,
                `Labels: ${prLabels || 'none'}`,
                '',
                'PR description:',
                prBody || '(no description)',
                '',
                `Target KB document: ${kbDoc}`,
                `Triggered by source files: ${kbDocToSources[kbDoc].join(', ')}`,
                '',
                'Relevant merged diff:',
                relevantDiff,
                '',
                'Current KB markdown:',
                currentContent.slice(0, maxDocChars),
              ].join('\n');

              const updatedContent = await callModel([
                { role: 'system', content: systemPrompt },
                { role: 'user', content: userPrompt },
              ]);

              if (updatedContent.trim() && updatedContent.trim() !== currentContent.trim()) {
                writeWorkspaceFile(kbDoc, `${updatedContent.trimEnd()}\n`);
                updatedDocs.push(kbDoc);
                kbSummaries[kbDoc] = kbDocToSources[kbDoc].join(', ');
              }
            }

            // ── Update INDEX.md when any KB doc changed ───────────────────────
            if (updatedDocs.length > 0) {
              const currentIndex = readWorkspaceFile(indexFile);
              const summaryText = Object.entries(kbSummaries)
                .map(([doc, sources]) => `- ${doc}: ${sources}`)
                .join('\n');
              const indexPrompt = [
                `PR #${pullNumber}: ${prTitle}`,
                `Author: @${prAuthor}`,
                '',
                'Updated KB docs in this run:',
                summaryText || '(none)',
                '',
                'Merged diff (first 20 000 chars):',
                fullDiff.slice(0, 20000),
                '',
                'Current INDEX.md:',
                currentIndex.slice(0, maxDocChars),
                '',
                'INDEX.md format rules:',
                '- Each module entry must have: ### {Title}, **File:** `path`, **Keywords:** csv-list, **Covers:** one-line summary.',
                '- Only add or refine entries justified by this PR. Do not remove existing entries.',
                '- Preserve all existing structure, tables, and agent operation rules.',
              ].join('\n');

              const updatedIndex = await callModel([
                { role: 'system', content: systemPrompt },
                { role: 'user', content: indexPrompt },
              ]);
              if (updatedIndex.trim() && updatedIndex.trim() !== currentIndex.trim()) {
                writeWorkspaceFile(indexFile, `${updatedIndex.trimEnd()}\n`);
                updatedDocs.push(indexFile);
              }
            }

            core.setOutput('changed', updatedDocs.length > 0 ? 'true' : 'false');
            core.setOutput('updated_docs', updatedDocs.join('\n'));

      # ── Step 3: Stage, detect and commit changes directly to main ─────────
      - name: Detect staged KB changes
        id: detect_changes
        run: |
          git add doc/ KB-INDEX.md 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit KB updates to main
        if: steps.detect_changes.outputs.changed == 'true'
        run: |
          git config user.name "KB Update Bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "docs(kb): auto-update after PR #${{ github.event.pull_request.number || inputs.pull_number }}

          PR: ${{ github.event.pull_request.title || 'Manual run' }}
          Author: @${{ github.event.pull_request.user.login || 'workflow_dispatch' }}
          Ref: https://github.com/${{ github.repository }}/pull/${{ github.event.pull_request.number || inputs.pull_number }}

          [skip ci]"
          git push origin main

      # ── Step 4: Job summary ───────────────────────────────────────────────
      - name: Write job summary
        if: always()
        run: |
          PR_NUM="${{ github.event.pull_request.number || inputs.pull_number }}"
          PR_TITLE="${{ github.event.pull_request.title || 'Manual run' }}"
          PR_AUTHOR="${{ github.event.pull_request.user.login || 'workflow_dispatch' }}"
          PR_URL="https://github.com/${{ github.repository }}/pull/${PR_NUM}"
          echo "## KB Updater" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| PR | [#${PR_NUM} — ${PR_TITLE}](${PR_URL}) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Author | @${PR_AUTHOR} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Diff size | ${{ steps.kb_agent.outputs.diff_bytes || '0' }} bytes |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Agent step | ${{ steps.kb_agent.outcome }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| KB changes committed | ${{ steps.detect_changes.outputs.changed || 'false' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -n "${{ steps.kb_agent.outputs.updated_docs }}" ]; then
            echo "### Updated docs" >> "$GITHUB_STEP_SUMMARY"
            printf '%s\n' "${{ steps.kb_agent.outputs.updated_docs }}" | sed 's/^/- /' >> "$GITHUB_STEP_SUMMARY"
          fi
