name: Agentic KB Updater

on:
  pull_request:
    types: [closed]
    branches:
      - main

concurrency:
  group: kb-updater-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  update-knowledge-base:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: read
      models: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.KB_BOT_PAT || github.token }}

      - name: Run GitHub-native KB agent
        id: kb_agent
        uses: actions/github-script@v7
        continue-on-error: true
        env:
          MODEL_ID: openai/gpt-4.1
          GITHUB_MODELS_TOKEN: ${{ github.token }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pullNumber = context.payload.pull_request.number;
            const prTitle = context.payload.pull_request.title || 'Untitled PR';
            const prBody = context.payload.pull_request.body || '';
            const prAuthor = context.payload.pull_request.user?.login || 'unknown';
            const prLabels = (context.payload.pull_request.labels || []).map((label) => label.name).join(', ');
            const workspace = process.env.GITHUB_WORKSPACE;
            const modelId = process.env.MODEL_ID;
            const modelsToken = process.env.GITHUB_MODELS_TOKEN;
            const today = new Date().toISOString().slice(0, 10);

            const fileToKbMap = [
              [/^src\/pages\/HomePage\.jsx$/, ['doc/01-public-storytelling-module.md']],
              [/^src\/pages\/AboutPage\.jsx$/, ['doc/01-public-storytelling-module.md']],
              [/^src\/pages\/GalleryPage\.jsx$/, ['doc/01-public-storytelling-module.md']],
              [/^src\/pages\/TeamPage\.jsx$/, ['doc/01-public-storytelling-module.md']],
              [/^src\/pages\/MediaPage\.jsx$/, ['doc/01-public-storytelling-module.md']],
              [/^src\/pages\/ContactPage\.jsx$/, ['doc/01-public-storytelling-module.md']],
              [/^src\/components\/GalleryCard/, ['doc/01-public-storytelling-module.md']],
              [/^src\/components\/GalleryGrid/, ['doc/01-public-storytelling-module.md']],
              [/^src\/components\/BlogCard/, ['doc/01-public-storytelling-module.md']],
              [/^src\/components\/AnimatedCounter/, ['doc/01-public-storytelling-module.md']],
              [/^src\/components\/Card\.jsx$/, ['doc/01-public-storytelling-module.md']],
              [/^src\/components\/SEO\.jsx$/, ['doc/01-public-storytelling-module.md']],
              [/^src\/components\/Footer\.jsx$/, ['doc/01-public-storytelling-module.md']],
              [/^src\/pages\/EventsPage\.jsx$/, ['doc/02-events-module.md']],
              [/^src\/components\/Event/, ['doc/02-events-module.md']],
              [/^src\/pages\/VolunteerPage\.jsx$/, ['doc/03-community-engagement-module.md']],
              [/^src\/pages\/BranchesPage\.jsx$/, ['doc/03-community-engagement-module.md']],
              [/^src\/components\/VolunteerManagement/, ['doc/03-community-engagement-module.md']],
              [/^src\/components\/Branch/, ['doc/03-community-engagement-module.md']],
              [/^src\/pages\/DonatePage\.jsx$/, ['doc/04-donations-fundraising-module.md']],
              [/^src\/components\/DonationManagement/, ['doc/04-donations-fundraising-module.md']],
              [/^src\/services\/razorpayService/, ['doc/04-donations-fundraising-module.md']],
              [/^functions\/index\.js$/, ['doc/04-donations-fundraising-module.md']],
              [/^src\/pages\/AdminDashboard\.jsx$/, ['doc/05-admin-content-management-module.md']],
              [/^src\/components\/GalleryManagement/, ['doc/05-admin-content-management-module.md']],
              [/^src\/components\/GalleryForm/, ['doc/05-admin-content-management-module.md']],
              [/^src\/components\/TeamManagement/, ['doc/05-admin-content-management-module.md']],
              [/^src\/components\/BlogManagement/, ['doc/05-admin-content-management-module.md']],
              [/^src\/components\/BlogModal/, ['doc/05-admin-content-management-module.md']],
              [/^src\/components\/StoriesTestimonialsManagement/, ['doc/05-admin-content-management-module.md']],
              [/^src\/components\/ImageUpload/, ['doc/05-admin-content-management-module.md']],
              [/^src\/components\/AdminSetup/, ['doc/05-admin-content-management-module.md']],
              [/^src\/App\.jsx$/, ['doc/06-platform-infrastructure-auth-module.md']],
              [/^src\/pages\/AdminLogin\.jsx$/, ['doc/06-platform-infrastructure-auth-module.md']],
              [/^src\/pages\/MaintenancePage\.jsx$/, ['doc/06-platform-infrastructure-auth-module.md']],
              [/^src\/pages\/NotFoundPage\.jsx$/, ['doc/06-platform-infrastructure-auth-module.md']],
              [/^src\/context\/AuthContext/, ['doc/06-platform-infrastructure-auth-module.md']],
              [/^src\/context\/NotificationContext/, ['doc/06-platform-infrastructure-auth-module.md']],
              [/^src\/components\/ProtectedRoute/, ['doc/06-platform-infrastructure-auth-module.md']],
              [/^src\/components\/ErrorBoundary/, ['doc/06-platform-infrastructure-auth-module.md']],
              [/^src\/components\/ScrollToTop/, ['doc/06-platform-infrastructure-auth-module.md']],
              [/^src\/components\/Navbar/, ['doc/06-platform-infrastructure-auth-module.md']],
              [/^src\/services\/firebase\.js$/, ['doc/06-platform-infrastructure-auth-module.md']],
              [/^src\/config\//, ['doc/06-platform-infrastructure-auth-module.md']],
              [/^firebase\.json$/, ['doc/06-platform-infrastructure-auth-module.md']],
              [/^vercel\.json$/, ['doc/06-platform-infrastructure-auth-module.md']],
              [/^vite\.config\.js$/, ['doc/06-platform-infrastructure-auth-module.md']],
              [/^tailwind\.config\.js$/, ['doc/06-platform-infrastructure-auth-module.md']],
              [/^src\/hooks\/useFirebaseQueries/, ['doc/quick-reference.md']],
              [/^src\/hooks\/useCRUD/, ['doc/quick-reference.md']],
              [/^src\/hooks\/useFirestore/, ['doc/quick-reference.md']],
              [/^src\/services\/cachedDatabaseService/, ['doc/quick-reference.md']],
              [/^src\/services\/cacheService/, ['doc/quick-reference.md']],
              [/^src\/services\/emailService/, ['doc/quick-reference.md']],
              [/^src\/services\/imageUploadService/, ['doc/quick-reference.md']],
              [/^src\/utils\//, ['doc/quick-reference.md']],
              [/^package\.json$/, ['doc/quick-reference.md', 'doc/06-platform-infrastructure-auth-module.md']],
            ];

            const indexTriggerDocs = new Set([
              'doc/01-public-storytelling-module.md',
              'doc/02-events-module.md',
              'doc/03-community-engagement-module.md',
              'doc/04-donations-fundraising-module.md',
              'doc/05-admin-content-management-module.md',
              'doc/06-platform-infrastructure-auth-module.md',
              'doc/quick-reference.md',
            ]);

            const systemPrompt = [
              'You maintain the Knowledge Base for the Dada Chi Shala website repository.',
              'Update only the KB sections directly justified by the provided merged PR diff.',
              'Preserve existing headings, tables, Mermaid blocks, and requirement IDs unless the diff clearly changes them.',
              `Update date fields to ${today} only when the document content changes.`,
              'Return only the complete updated markdown document. No code fences. No explanation.',
            ].join(' ');

            const listFiles = await github.paginate(github.rest.pulls.listFiles, {
              owner,
              repo,
              pull_number: pullNumber,
              per_page: 100,
            });

            const changedFiles = listFiles.map((file) => file.filename);
            const sourceFiles = changedFiles.filter((file) => !file.startsWith('doc/') && file !== 'INDEX.md' && !file.startsWith('.github/'));

            const kbDocToSources = {};
            for (const sourceFile of sourceFiles) {
              for (const [pattern, kbDocs] of fileToKbMap) {
                if (pattern.test(sourceFile)) {
                  for (const kbDoc of kbDocs) {
                    kbDocToSources[kbDoc] ||= [];
                    if (!kbDocToSources[kbDoc].includes(sourceFile)) {
                      kbDocToSources[kbDoc].push(sourceFile);
                    }
                  }
                }
              }
            }

            const affectedDocs = Object.keys(kbDocToSources);
            core.info(`Changed files: ${JSON.stringify(changedFiles)}`);
            core.info(`Affected KB docs: ${JSON.stringify(affectedDocs)}`);

            if (affectedDocs.length === 0) {
              core.setOutput('changed', 'false');
              core.setOutput('updated_docs', '');
              core.setOutput('diff_bytes', '0');
              return;
            }

            const diffResponse = await github.request('GET /repos/{owner}/{repo}/pulls/{pull_number}', {
              owner,
              repo,
              pull_number: pullNumber,
              headers: {
                accept: 'application/vnd.github.v3.diff',
              },
            });

            const fullDiff = String(diffResponse.data || '');
            core.setOutput('diff_bytes', String(Buffer.byteLength(fullDiff, 'utf8')));

            const extractDiffForFiles = (diffText, files) => {
              const blocks = diffText.split(/(?=^diff --git )/m);
              const relevant = [];
              for (const block of blocks) {
                if (files.some((file) => block.includes(` b/${file}`))) {
                  relevant.push(block);
                }
              }
              return relevant.join('\n').slice(0, 40000);
            };

            const callModel = async (messages) => {
              const response = await fetch('https://models.github.ai/inference/chat/completions', {
                method: 'POST',
                headers: {
                  'Accept': 'application/vnd.github+json',
                  'Authorization': `Bearer ${modelsToken}`,
                  'Content-Type': 'application/json',
                  'X-GitHub-Api-Version': '2022-11-28',
                },
                body: JSON.stringify({
                  model: modelId,
                  temperature: 0.1,
                  max_tokens: 4000,
                  messages,
                }),
              });

              if (!response.ok) {
                const body = await response.text();
                throw new Error(`GitHub Models request failed (${response.status}): ${body}`);
              }

              const payload = await response.json();
              return payload.choices?.[0]?.message?.content || '';
            };

            const readWorkspaceFile = (relativePath) => {
              return fs.readFileSync(path.join(workspace, relativePath), 'utf8');
            };

            const writeWorkspaceFile = (relativePath, content) => {
              fs.writeFileSync(path.join(workspace, relativePath), content, 'utf8');
            };

            const updatedDocs = [];
            const kbSummaries = {};

            for (const kbDoc of affectedDocs) {
              const currentContent = readWorkspaceFile(kbDoc);
              const relevantDiff = extractDiffForFiles(fullDiff, kbDocToSources[kbDoc]);
              if (!relevantDiff.trim()) {
                continue;
              }

              const userPrompt = [
                `PR #${pullNumber}: ${prTitle}`,
                `Author: @${prAuthor}`,
                `Labels: ${prLabels || 'none'}`,
                '',
                'PR description:',
                prBody || '(no description)',
                '',
                `Target KB document: ${kbDoc}`,
                `Triggered by source files: ${kbDocToSources[kbDoc].join(', ')}`,
                '',
                'Relevant merged diff:',
                relevantDiff,
                '',
                'Current KB markdown:',
                currentContent.slice(0, 80000),
              ].join('\n');

              const updatedContent = await callModel([
                { role: 'system', content: systemPrompt },
                { role: 'user', content: userPrompt },
              ]);

              if (updatedContent.trim() && updatedContent.trim() !== currentContent.trim()) {
                writeWorkspaceFile(kbDoc, `${updatedContent.trimEnd()}\n`);
                updatedDocs.push(kbDoc);
                kbSummaries[kbDoc] = kbDocToSources[kbDoc].join(', ');
              }
            }

            if (updatedDocs.some((doc) => indexTriggerDocs.has(doc))) {
              const indexPath = 'INDEX.md';
              const currentIndex = readWorkspaceFile(indexPath);
              const summaryText = Object.entries(kbSummaries)
                .map(([doc, sources]) => `- ${doc}: ${sources}`)
                .join('\n');

              const indexPrompt = [
                `PR #${pullNumber}: ${prTitle}`,
                `Author: @${prAuthor}`,
                '',
                'Updated KB docs in this run:',
                summaryText || '(none)',
                '',
                'Merged diff:',
                fullDiff.slice(0, 20000),
                '',
                'Current INDEX.md:',
                currentIndex.slice(0, 80000),
                '',
                'Only add or refine keyword lookup rows justified by this PR. Do not remove existing rows.',
              ].join('\n');

              const updatedIndex = await callModel([
                { role: 'system', content: systemPrompt },
                { role: 'user', content: indexPrompt },
              ]);

              if (updatedIndex.trim() && updatedIndex.trim() !== currentIndex.trim()) {
                writeWorkspaceFile(indexPath, `${updatedIndex.trimEnd()}\n`);
                updatedDocs.push(indexPath);
              }
            }

            core.setOutput('changed', updatedDocs.length > 0 ? 'true' : 'false');
            core.setOutput('updated_docs', updatedDocs.join('\n'));

      - name: Detect staged KB changes
        id: detect_changes
        run: |
          git add doc/ INDEX.md 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit KB updates
        if: steps.detect_changes.outputs.changed == 'true'
        run: |
          git config user.name "KB Update Bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "docs(kb): auto-update after PR #${{ github.event.pull_request.number }}

          PR: ${{ github.event.pull_request.title }}
          Author: @${{ github.event.pull_request.user.login }}
          Ref: https://github.com/${{ github.repository }}/pull/${{ github.event.pull_request.number }}

          [skip ci]"
          git push origin main

      - name: Write job summary
        if: always()
        run: |
          PR_URL="https://github.com/${{ github.repository }}/pull/${{ github.event.pull_request.number }}"
          echo "## Agentic KB Updater" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| PR | [#${{ github.event.pull_request.number }} - ${{ github.event.pull_request.title }}](${PR_URL}) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Author | @${{ github.event.pull_request.user.login }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Diff size | ${{ steps.kb_agent.outputs.diff_bytes || '0' }} bytes |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Agent step | ${{ steps.kb_agent.outcome }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| KB changes committed | ${{ steps.detect_changes.outputs.changed || 'false' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -n "${{ steps.kb_agent.outputs.updated_docs }}" ]; then
            echo "### Updated docs" >> "$GITHUB_STEP_SUMMARY"
            printf '%s\n' "${{ steps.kb_agent.outputs.updated_docs }}" | sed 's/^/- /' >> "$GITHUB_STEP_SUMMARY"
          fi
